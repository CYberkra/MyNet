# 3060 Laptop (6 GB) Pilot Production Config
# VERIFIED: dx=0.05m works on 6GB GPU (800K cells, <1GB VRAM used)
# VERIFIED: 100 MHz Ricker matches real data spectrum (peak 104.1 MHz)
# VERIFIED: epsilon_r 7-14 passes gprMax wavelength check at dx=0.05m
plan_name: yingshan_pilot_3060_v1
random_seed: 20260612
scene_count: 100
components: [raw, target_only, background_only, air_only]

scene:
  dimension: 2D
  family: yingshan_pilot_all_families
  scan_length_m: 30
  trace_count: 40
  trace_interval_m: 0.75
  domain_depth_m: 28
  air_margin_m: 5
  dx_m: 0.05
  column_width_m: 0.50
  samples: 501
  time_window_ns: 700
  center_frequency_hz: 100000000
  flight_height_m: 12
  tx_rx_offset_m: 1.4
  interface_depth_m: [5.0, 22.0]
  interface_roughness_m: [0.3, 3.5]
  slope_deg: [0, 25]
  clutter_level: medium

geology:
  scenario_family: yingshan_pilot_all_families
  interface_depth_min_m: 5.0
  interface_depth_max_m: 22.0
  interface_roughness_m: 1.5
  slope_deg_min: 0
  slope_deg_max: 25
  water_table_probability: 0.25
  paddy_water_probability: 0.25
  overhead_wire_probability: 0.0       # 暂不做外部杂波
  tree_probability: 0.0                # 暂不做
  building_probability: 0.0            # 暂不做
  anomaly_probability: 0.20
  terrace_probability: 0.30
  blocky_gravel_probability: 0.45
  random_seed: 20260612

run:
  use_gpu: true
  gpu_ids: [0]
  geometry_only_first: true
  geometry_fixed: true
  openmp_threads: 4
  mpi_tasks: 0
