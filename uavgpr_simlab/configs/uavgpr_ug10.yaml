system:
  name: CDUT-UavGPR UG10
  radar_type: SFCW low-frequency air-coupled UAV-GPR
  frequency_band_hz: [20000000.0, 170000000.0]
  nominal_band_hz: [50000000.0, 150000000.0]
  center_frequency_hz: 100000000.0
  intermediate_frequency_bandwidth_hz: 10000.0
  frequency_step_hz: 1000000.0
  frequency_points: 501
  time_window_ns: 700.0
  samples_per_trace: 501
  tx_signal_gain_dbm: 36.0
  trace_rate_hz: 10.0
  antenna_pair_length_m: 1.4
flight:
  default_height_m: 8.0
  height_range_m: [2.0, 20.0]
  default_speed_mps: 1.0
  line_spacing_m: 5.0
processing_chain:
  - low_frequency_drift_correction
  - zero_time_correction
  - absorption_attenuation_compensation
  - mean_background_subtraction
  - spike_clutter_suppression
  - svd_filter
  - wavelet_filter
  - wavelet_svd_filter
  - migration_or_rtm
  - interface_recognition
paper_goal:
  method_route: simulation supervised + real-domain adaptation + drilling constrained validation
  first_paper: PGDA-CSNet / sim-to-real clutter suppression
  second_paper: UavGPR system and landslide bedrock-interface application
