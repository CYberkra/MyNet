name: official-mamba2-cuda

on:
  workflow_dispatch:

jobs:
  aeropath-501x256:
    # A repository-managed GPU runner is required. This workflow is manual so
    # ordinary CPU CI never pretends to validate the official CUDA dependency.
    runs-on: [self-hosted, windows, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Validate official Mamba2 at formal resolution
        shell: pwsh
        run: |
          python -m pip install -r requirements.txt
          python -m pip install mamba-ssm
          python scripts/smoke_official_mamba2_cuda.py --backward
