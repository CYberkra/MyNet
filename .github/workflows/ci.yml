name: research-ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu-contract-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install CPU development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint active Python surfaces
        run: python -m ruff check pgdacsnet scripts tests
      - name: Validate configuration schema and split guards
        run: python scripts/check_configs.py
      - name: Run deterministic CPU regression suite
        run: |
          python -m pytest -q \
            tests/test_p0_training_guards.py \
            tests/test_aeropath_ssd.py \
            tests/test_experiment_contract.py \
            tests/test_runtime_portability.py \
            tests/test_handoff_record.py \
            tests/test_hardware_measurement_contract.py

# This workflow deliberately excludes gprMax solver runs, large released data,
# and the official Mamba2 CUDA extension. Those require the self-hosted GPU
# workflow and explicit dataset or hardware gates; a green CPU job is not a
# formal-training or physics-release approval.
